<div class="lightbox" id="lightbox" hidden>
  <button class="lightbox__close" type="button" aria-label="Close">&times;</button>
  <button class="lightbox__nav lightbox__nav--prev" type="button" aria-label="Previous">&#8249;</button>
  <img class="lightbox__img" id="lightbox-img" src="" alt="">
  <button class="lightbox__nav lightbox__nav--next" type="button" aria-label="Next">&#8250;</button>
  <div class="lightbox__caption" id="lightbox-caption"></div>
</div>

<script>
(function () {
  var box = document.getElementById('lightbox');
  if (!box) return;
  var imgEl = document.getElementById('lightbox-img');
  var capEl = document.getElementById('lightbox-caption');
  var photos = Array.prototype.slice.call(document.querySelectorAll('[data-zoom]'));
  if (!photos.length) return;
  var idx = 0;

  function show(i) {
    idx = (i + photos.length) % photos.length;
    var el = photos[idx];
    imgEl.src = el.getAttribute('data-full') || el.src;
    var cap = el.getAttribute('data-caption') || '';
    capEl.textContent = cap;
    capEl.style.display = cap ? 'block' : 'none';
  }
  function open(i) {
    show(i);
    box.hidden = false;
    requestAnimationFrame(function () { box.classList.add('is-open'); });
    document.body.style.overflow = 'hidden';
  }
  function close() {
    box.classList.remove('is-open');
    document.body.style.overflow = '';
    setTimeout(function () { box.hidden = true; imgEl.src = ''; }, 200);
  }

  photos.forEach(function (el, i) {
    el.addEventListener('click', function () { open(i); });
  });
  box.querySelector('.lightbox__close').addEventListener('click', close);
  box.querySelector('.lightbox__nav--prev').addEventListener('click', function (e) { e.stopPropagation(); show(idx - 1); });
  box.querySelector('.lightbox__nav--next').addEventListener('click', function (e) { e.stopPropagation(); show(idx + 1); });
  box.addEventListener('click', function (e) { if (e.target === box) close(); });
  document.addEventListener('keydown', function (e) {
    if (box.hidden) return;
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowLeft') show(idx - 1);
    else if (e.key === 'ArrowRight') show(idx + 1);
  });
})();
</script>
